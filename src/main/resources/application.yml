server:
  port: 8081

spring:
  application:
    name: emporio-backend

  datasource:
    url: jdbc:mysql://localhost:3306/emporio_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # 'validate' y no 'update': en un entorno real el esquema lo maneja Flyway,
    # no Hibernate. Si algo no cuadra entre entidades y tablas, la app truena
    # al arrancar en vez de "arreglarlo solo" silenciosamente.
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.emporio: DEBUG
    org.hibernate.SQL: DEBUG

